<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ffffff">
  <title>Test Case Details - INGenious</title>
  
  <!-- Modern CSS Framework -->
  <link rel="stylesheet" href="../../../../media/css/modern/tailwind.min.css">
  <link rel="stylesheet" href="../../../../media/css/modern/components.css">
  <link rel="stylesheet" href="../../../../media/css/modern/themes/light.css" id="theme-light">
  <link rel="stylesheet" href="../../../../media/css/modern/themes/dark.css" id="theme-dark" disabled>
  <link rel="stylesheet" href="../../../../media/css/modern/themes/indigo.css" id="theme-accent">
  
  <!-- Report Data -->
  <script>var DATA = {};</script>
  <script src="data.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    /* Alpine.js cloak */
    [x-cloak] { display: none !important; }
    
    /* Step Timeline Styles */
    .step-timeline {
      position: relative;
    }
    .step-timeline::before {
      content: '';
      position: absolute;
      left: 1.25rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border-color);
    }
    .step-item {
      position: relative;
      padding-left: 3.5rem;
      padding-bottom: 1.5rem;
    }
    .step-item:last-child {
      padding-bottom: 0;
    }
    .step-item__marker {
      position: absolute;
      left: 0.5rem;
      top: 1.25rem;
      width: auto;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .step-item__marker--passed svg { 
      color: #10b981;
      width: 1.5rem;
      height: 1.5rem;
    }
    .step-item__marker--failed svg { 
      color: #ef4444;
      width: 1.5rem;
      height: 1.5rem;
    }
    .step-item__marker--warning svg {
      color: #f59e0b;
      width: 1.5rem;
      height: 1.5rem;
    }
    .step-item__marker--done svg { 
      color: #7724ff;
      width: 1.5rem;
      height: 1.5rem;
    }
    .step-item__content {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      overflow: visible;
    }
    .step-item__header {
      padding: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s;
    }
    .step-item__header:hover {
      background: var(--bg-hover);
    }
    .step-item__body {
      padding: 1rem;
      border-top: 1px solid var(--border-color);
      background: var(--bg-primary);
    }
    
    /* Override step-item layout for nested steps inside reusable components */
    .reusable-component .step-item {
      position: static;
      padding-left: 0;
      padding-bottom: 0.75rem;
      margin-bottom: 0;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    
    .reusable-component .step-item > .step-item__marker:first-child {
      position: static;
      left: auto;
      top: auto;
      width: auto;
      height: auto;
      display: flex;
      flex-shrink: 0;
      align-items: center;
      justify-content: center;
      padding-top: 0.25rem;
    }
    
    .reusable-component .step-item__content {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      overflow: visible;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
    }
    
    .reusable-component .step-item__content > .step-item__marker {
      position: static;
      width: auto;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0;
      margin: 0;
      left: auto;
      top: auto;
      flex-wrap: wrap;
    }
    
    .reusable-component .step-item__content > .step-item__marker > div:first-child {
      flex: 1;
      min-width: 0;
    }
    
    .reusable-component .step-item__content > .step-item__marker > div:last-child {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    
    .reusable-component .step-item__header {
      padding: 0;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      cursor: default;
      background: transparent;
    }
    
    .reusable-component .step-item__header:hover {
      background: transparent;
    }
    
    .reusable-component .step-item__body {
      padding: 0.75rem 0 0 0;
      border-top: none;
      background: transparent;
      display: block;
      margin-left: 1.5rem;
    }
    
    /* Reusable Component Styles */
    .reusable-component {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-left: 4px solid #9b59b6;
    }
    .dark .reusable-component {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-left: 4px solid #9b59b6;
    }
    .reusable-component > div:first-child {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .reusable-component > div:first-child:hover {
      background: rgba(180, 135, 255, 0.1);
    }
    .dark .reusable-component > div:first-child:hover {
      background: rgba(180, 135, 255, 0.15);
    }
    .reusable-header--passed {
      border-left-color: #10b981;
    }
    .reusable-header--failed {
      border-left-color: #ef4444;
    }

    .badge--warning {
      background: #fef3c7;
      color: #b45309;
    }
    .dark .badge--warning {
      background: rgba(245, 158, 11, 0.2);
      color: #fbbf24;
    }

    .axe-modal-overlay {
      background: radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.18), transparent 35%),
                  radial-gradient(circle at 80% 30%, rgba(236, 72, 153, 0.16), transparent 40%),
                  rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(6px);
    }
    .axe-modal-panel {
      position: relative;
      max-height: 90vh;
      width: 100%;
      max-width: 64rem;
      overflow: hidden;
      border-radius: 1rem;
      border: 1px solid rgba(99, 102, 241, 0.25);
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.35);
    }
    .axe-modal-glow {
      position: absolute;
      inset: -40px;
      background: radial-gradient(circle at top, rgba(99, 102, 241, 0.25), transparent 45%);
      pointer-events: none;
    }
    .axe-modal-body {
      max-height: calc(90vh - 96px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(99, 102, 241, 0.6) transparent;
    }
    .axe-modal-body::-webkit-scrollbar {
      width: 10px;
    }
    .axe-modal-body::-webkit-scrollbar-thumb {
      background: rgba(99, 102, 241, 0.5);
      border-radius: 999px;
    }
    
    /* Syntax Highlighting for JSON and XML Payloads */
    .json-key {
      color: #9cdcfe;
      font-weight: 500;
    }
    .json-string {
      color: #ce9178;
    }
    .json-number {
      color: #b5cea8;
    }
    .json-boolean {
      color: #569cd6;
      font-weight: 600;
    }
    .json-null {
      color: #569cd6;
      font-style: italic;
    }
    .xml-tag {
      color: #4ec9b0;
      font-weight: 500;
    }
    .xml-bracket {
      color: #808080;
    }
    .xml-attr-name {
      color: #9cdcfe;
    }
    .xml-attr-value {
      color: #ce9178;
    }
    .xml-comment {
      color: #6a9955;
      font-style: italic;
    }
  </style>
</head>
<body x-data="detailedReportApp()" x-init="init()" :class="{ 'dark': isDark }">
  
  <!-- App Shell -->
  <div class="app-shell">
    
    <!-- Header -->
    <header class="app-header">
      <div class="app-header__content">
        <div class="flex items-start gap-5 flex-1">
          <!-- Back Button -->
          <a href="summary-v2.html" class="text-gray-400 hover:text-gray-600 dark:text-gray-500 dark:hover:text-gray-300 mt-1.5" title="Back to Summary">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
          </a>
          
          <!-- Report Icon & Title -->
          <div class="flex items-start gap-4 flex-1">
            <div class="p-2.5 bg-blue-100 dark:bg-blue-900/30 rounded-lg">
              <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 3v5a2 2 0 002 2h5"/>
              </svg>
            </div>
            
            <div class="flex-1 pt-0.5 text-center">
              <h1 class="text-3xl font-black text-blue-600 dark:text-blue-400" x-text="title"></h1>
              <p class="text-sm text-gray-600 dark:text-gray-400 mt-1" x-text="currentBrowserInfo"></p>
            </div>
          </div>
        </div>
        
        <!-- Header Actions -->
        <div class="flex items-center gap-3">
          <!-- Browser/View Selector -->
          <select 
            x-model="currentView"
            @change="updateView()"
            class="px-3 py-2 text-sm border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 focus:ring-2 focus:ring-accent-500 print:hidden"
          >
            <template x-for="browser in browsers" :key="browser">
              <option :value="browser" x-text="browser"></option>
            </template>
            <option value="ALL" x-show="browsers.length > 1">All Browsers</option>
          </select>
          
          <!-- Theme Toggle -->
          <button 
            class="btn btn--icon btn--secondary print:hidden" 
            @click="toggleTheme()"
            :title="isDark ? 'Switch to Light Mode' : 'Switch to Dark Mode'"
          >
            <svg x-show="!isDark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
            </svg>
            <svg x-show="isDark" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
            </svg>
          </button>
          
          <!-- Print Button -->
          <button class="btn btn--icon btn--secondary print:hidden" @click="window.print()" title="Print Report">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>
    
    <!-- Main Content -->
    <main class="app-main">
      <div class="container mx-auto px-4 py-6 max-w-6xl">
        
        <!-- Test Case Summary -->
        <section class="card mb-6">
          <div class="card__header">
            <h2 class="card__title">Test Case Summary</h2>
          </div>
          <div class="card__body">
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4">
              <!-- Status -->
              <div class="text-center p-4 bg-gray-50 dark:bg-gray-800 rounded-lg">
                <div class="text-sm text-muted mb-1">Status</div>
                <span 
                  class="badge text-base" 
                  :class="currentDetails.status === 'PASS'
                    ? 'badge--passed'
                    : (currentDetails.status === 'FAIL'
                      ? 'badge--failed'
                      : (currentDetails.status === 'WARNING'
                        ? 'badge--warning'
                        : 'badge--done'))"
                  x-text="currentDetails.status"
                ></span>
              </div>
              
              <!-- Browser -->
              <div class="text-center p-4 bg-gray-50 dark:bg-gray-800 rounded-lg">
                <div class="text-sm text-muted mb-1">Browser</div>
                <div class="font-semibold" x-text="currentDetails.browser || '-'"></div>
                <div class="text-xs text-muted" x-text="currentDetails.bversion || ''"></div>
              </div>
              
              <!-- Platform -->
              <div class="text-center p-4 bg-gray-50 dark:bg-gray-800 rounded-lg">
                <div class="text-sm text-muted mb-1">Platform</div>
                <div class="font-semibold" x-text="currentDetails.platform || '-'"></div>
              </div>
              
              <!-- Duration -->
              <div class="text-center p-4 bg-gray-50 dark:bg-gray-800 rounded-lg">
                <div class="text-sm text-muted mb-1">Duration</div>
                <div class="font-semibold" x-text="currentDetails.exeTime || '-'"></div>
              </div>
              
              <!-- Steps -->
              <div class="text-center p-4 bg-gray-50 dark:bg-gray-800 rounded-lg">
                <div class="text-sm text-muted mb-1">Steps</div>
                <div class="flex justify-center gap-3">
                  <span class="text-emerald-600 font-semibold">
                    <span x-text="currentDetails.nopassTests || 0"></span> ✓
                  </span>
                  <span class="text-red-600 font-semibold">
                    <span x-text="currentDetails.nofailTests || 0"></span> ✗
                  </span>
                </div>
              </div>
            </div>
            
            <!-- Execution Times -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-4 pt-4 border-t border-gray-100 dark:border-gray-700">
              <div class="grid grid-cols-[120px_1fr] gap-4 items-center">
                <span class="text-muted">Start Time:</span>
                <span class="font-medium" x-text="currentDetails.startTime || '-'"></span>
              </div>
              <div class="grid grid-cols-[120px_1fr] gap-4 items-center">
                <span class="text-muted">End Time:</span>
                <span class="font-medium" x-text="currentDetails.endTime || '-'"></span>
              </div>
            </div>
          </div>
        </section>
        
        <!-- Steps Section -->
        <section class="card">
          <div class="card__header flex flex-col gap-4">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
              <h2 class="card__title">Execution Steps</h2>
              
              <!-- Search Input -->
              <div class="flex-1 sm:flex-initial sm:max-w-xs">
                <input
                  type="text"
                  x-model="stepFilter"
                  placeholder="Search steps..."
                  class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent-500 dark:focus:ring-accent-400"
                  title="Filter steps by name or description"
                >
              </div>
            </div>
            
            <!-- Step Controls -->
            <div class="flex flex-col sm:flex-row sm:items-center gap-3">
              <!-- Show Failed Only -->
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input 
                  type="checkbox" 
                  x-model="showFailedOnly"
                  class="rounded border-gray-300 text-accent-600 focus:ring-accent-500"
                >
                <span>Show failed only</span>
              </label>
              
              <!-- Expand/Collapse All -->
              <div class="btn-group">
                <button 
                  class="btn btn--secondary btn--sm" 
                  @click="expandAll()"
                  title="Expand All"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                  </svg>
                </button>
                <button 
                  class="btn btn--secondary btn--sm" 
                  @click="collapseAll()"
                  title="Collapse All"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
          
          <div class="card__body">
            <!-- Steps Timeline - Hierarchical View -->
            <div class="step-timeline">
              <!-- Iterate through each iteration -->
              <template x-for="(iteration, iterIdx) in getAllIterations()" :key="'iter-' + iterIdx">
                <!-- Iteration Container -->
                <div class="mb-6 pb-6 border-b border-gray-200 dark:border-gray-700 last:border-b-0">
                  <!-- Iteration Header -->
                  <div class="flex items-center gap-3 mb-4">
                    <div class="px-3 py-1 rounded-full text-sm font-semibold" 
                         :class="iteration.status === 'PASS' ? 'bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400' : 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400'"
                         x-text="iteration.name">
                    </div>
                    <span class="text-sm text-muted" x-text="iteration.status"></span>
                  </div>
                  
                  <!-- Iteration Items (Reusables and Direct Steps) -->
                  <div class="space-y-4 pl-4 border-l-2 border-gray-200 dark:border-gray-600">
                    <template x-for="(item, itemIdx) in (iteration.data || [])" :key="'item-' + iterIdx + '-' + itemIdx">
                      <div class="contents">
                        <!-- Reusable Component -->
                        <template x-if="item && item.type === 'reusable'">
                          <div class="reusable-component rounded-lg overflow-visible" :class="item.status === 'PASS' ? 'reusable-header--passed' : 'reusable-header--failed'" x-show="hasMatchingSteps(item.data)">
                          <!-- Reusable Header (Clickable) -->
                          <div class="flex items-center gap-3 p-4 cursor-pointer bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors"
                               @click="toggleReusable(iterIdx, itemIdx)">
                            <!-- Status Indicator Icon -->
                            <div class="flex items-center justify-center flex-shrink-0">
                              <svg x-show="item.status === 'PASS'" class="w-5 h-5 text-green-600 dark:text-green-400" fill="currentColor" viewBox="0 0 20 20" title="Passed">
                                <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
                              </svg>
                              <svg x-show="item.status === 'FAIL'" class="w-5 h-5 text-red-600 dark:text-red-400" fill="currentColor" viewBox="0 0 20 20" title="Failed">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                              </svg>
                            </div>
                            
                            <!-- Reusable Info -->
                            <div class="flex-1">
                              <div class="font-semibold text-gray-800 dark:text-gray-200" x-text="item.name"></div>
                              <div class="text-sm text-gray-600 dark:text-gray-400" x-text="item.description || ''"></div>
                            </div>
                            
                            <!-- Status Badge & Expand Arrow -->
                            <div class="flex items-center gap-2">
                              <span class="badge text-xs" 
                                    :class="item.status === 'PASS'
                                      ? 'badge--passed'
                                      : (item.status === 'FAIL'
                                        ? 'badge--failed'
                                        : (item.status === 'WARNING'
                                          ? 'badge--warning'
                                          : 'badge--done'))"
                                    x-text="item.status">
                              </span>
                              <svg class="w-5 h-5 text-gray-400 transition-transform duration-200"
                                   :class="{ 'rotate-180': isReusableExpanded(iterIdx, itemIdx, item.data) }"
                                   fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                              </svg>
                            </div>
                          </div>
                          
                          <!-- Reusable Steps (Nested) -->
                          <div x-show="isReusableExpanded(iterIdx, itemIdx, item.data)" x-transition class="border-t border-gray-200 dark:border-gray-700 p-4 space-y-3 bg-gray-50 dark:bg-gray-900">
                            <template x-for="(step, stepIdx) in item.data" :key="'step-' + iterIdx + '-' + itemIdx + '-' + stepIdx">
                              <div class="step-item" x-show="(!showFailedOnly || step.data?.status === 'FAIL') && matchesSearchFilter(step.name, step.data?.description)">
                                <!-- Step Marker -->
                                <div class="step-item__marker"
                                     :class="item.data?.status === 'PASS'
                                       ? 'step-item__marker--passed'
                                       : (item.data?.status === 'FAIL'
                                         ? 'step-item__marker--failed'
                                         : (item.data?.status === 'WARNING'
                                           ? 'step-item__marker--warning'
                                           : 'step-item__marker--done'))">
                                  <svg x-show="step.data?.status === 'PASS'" fill="currentColor" viewBox="0 0 20 20" title="Passed">
                                    <path d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"/>
                                  </svg>
                                  <svg x-show="step.data?.status === 'FAIL'" fill="currentColor" viewBox="0 0 20 20" title="Failed">
                                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
                                  </svg>
                                  <svg x-show="item.data?.status === 'WARNING'" fill="currentColor" viewBox="0 0 20 20" title="Warning">
                                    <path fill-rule="evenodd" d="M18 10A8 8 0 112 10a8 8 0 0116 0zm-8-4a1 1 0 00-1 1v4a1 1 0 102 0V7a1 1 0 00-1-1zm0 8a1.25 1.25 0 100-2.5 1.25 1.25 0 000 2.5z" clip-rule="evenodd"/>
                                  </svg>
                                  <svg x-show="step.data?.status === 'DONE'" fill="currentColor" viewBox="0 0 20 20" title="Done">
                                    <circle cx="10" cy="10" r="3"/>
                                  </svg>
                                </div>
                                
                                <!-- Step Content -->
                                <div class="step-item__content">

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  
  <!-- Report Application -->
  <script>
    function detailedReportApp() {
      return {
        // State
        data: {},
        params: {},
        currentView: '',
        browsers: [],
        currentDetails: {},
        steps: [],
        expandedSteps: new Set(),
        expandedReusables: new Set(), // Track reusable expansion: "iterIdx-itemIdx"
        showFailedOnly: false,
        stepFilter: '',
        isDark: false,
        lightboxOpen: false,
        lightboxSrc: '',
        videoOpen: false,
        videoSrc: '',
        perfReport: false,
        
        // Computed
        get title() {
          return `${this.params.SC || 'Scenario'}: ${this.params.TC || 'Test Case'}`;
        },
        
        get currentBrowserInfo() {
          if (this.currentView === 'ALL') return 'All Browsers';
          return this.currentView;
        },
        
        get visibleSteps() {
          if (this.showFailedOnly) {
            return this.steps.filter(step => step.data?.status === 'FAIL');
          }
          return this.steps;
        },
        
        // Methods
        init() {
          // Parse URL parameters
          this.parseParams();
          
          // Ensure DATA is fully loaded (data.js loads asynchronously)
          // If DATA is not yet populated, queue init to run again
          if (typeof DATA === 'undefined' || !DATA.EXECUTIONS) {
            console.log('[INIT] DATA not ready, retrying in 100ms...');
            setTimeout(() => this.init(), 100);
            return;
          }
          
          // Load data from global DATA object
          this.data = DATA;
          this.perfReport = DATA.perfReport || false;
          
          
          // Process browser data
          this.processBrowserData();
          
          // Set initial view
          if (this.params.BRO === 'ALL') {
            this.currentView = 'ALL';
          } else {
            this.currentView = `${this.params.BRO || ''} ${this.params.BROV || ''} ${this.params.PLATF || ''} ${this.params.ITYPE || ''}`.trim();
          }
          
          // Update view
          this.updateView();
          
          // Load theme preference
          const savedTheme = localStorage.getItem('ingenious-report-theme');
          this.isDark = savedTheme === 'dark' || 
            (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches);
          this.applyTheme();
        },
        
        parseParams() {
          const params = new URLSearchParams(window.location.search);
          this.params = {
            SC: params.get('SC') || '',
            TC: params.get('TC') || '',
            BRO: params.get('BRO') || '',
            BROV: params.get('BROV') || '',
            PLATF: params.get('PLATF') || '',
            ITYPE: params.get('ITYPE') || ''
          };
        },
        
        processBrowserData() {
          if (!this.data.EXECUTIONS) return;
          
          // Filter executions for this test case
          const executions = this.data.EXECUTIONS.filter(exe => 
            exe.scenarioName === this.params.SC && exe.testcaseName === this.params.TC
          );
          
          // Extract unique browsers
          const browserSet = new Set();
          executions.forEach(exe => {
            const browserKey = `${exe.browser || ''} ${exe.bversion || ''} ${exe.platform || ''} ${exe.iterationType || ''}`.trim();
            if (browserKey) browserSet.add(browserKey);
          });
          
          this.browsers = [...browserSet];
          
        },
        
        updateView() {
          if (!this.data.EXECUTIONS) {
            console.warn('No EXECUTIONS data found');
            return;
          }
          
          // Find the matching execution
          const executions = this.data.EXECUTIONS.filter(exe => 
            exe.scenarioName === this.params.SC && exe.testcaseName === this.params.TC
          );
          
          if (executions.length === 0) {
            return;
          }
          
          if (this.currentView === 'ALL') {
            // Aggregate view - show first execution details
            this.currentDetails = executions[0] || {};
            // Aggregate all steps
            this.steps = [];
            executions.forEach(exe => {
              if (exe.STEPS) {
                this.steps = this.steps.concat(exe.STEPS);
              }
            });
          } else {
            // Try to find exact browser match first
            let exe = executions.find(e => {
              const browserKey = `${e.browser || ''} ${e.bversion || ''} ${e.platform || ''} ${e.iterationType || ''}`.trim();
              return browserKey === this.currentView;
            });
            
            // If no exact match, try matching just by browser name
            if (!exe && this.params.BRO) {
              exe = executions.find(e => e.browser === this.params.BRO);
            }
            
            // If still no match, use first execution
            if (!exe) {
              exe = executions[0];
            }
            
            this.currentDetails = exe || {};
            this.steps = exe?.STEPS || [];
            
          }
          
          // Reset expanded state
          this.expandedSteps = new Set();
          this.expandedReusables = new Set();
          
        },
        
        getAllIterations() {
          // Extract iterations from currentDetails.STEPS
          if (!this.currentDetails.STEPS) {
            return [];
          }
          
          // Filter iterations based on showFailedOnly if needed
          let iterations = this.currentDetails.STEPS.filter(item => item && item.type === 'iteration');
          if (this.showFailedOnly) {
            // Filter iterations that have at least one failed step anywhere in their hierarchy
            iterations = iterations.filter(iteration => 
              this.hasFailedSteps(iteration.data || [])
            );
          }
          
          return iterations;
        },
        
        hasFailedSteps(items) {
          // Recursively check if any step in items/nested items has failed status
          if (!items || !Array.isArray(items)) return false;
          
          for (let item of items) {
            if (item.type === 'step' && item.data?.status === 'FAIL') {
              return true;
            }
            if (item.type === 'reusable' && item.data) {
              if (this.hasFailedSteps(item.data)) {
                return true;
              }
            }
          }
          return false;
        },
        
        matchesSearchFilter(name, description) {
          // Check if step/item name or description matches the search filter
          if (!this.stepFilter || this.stepFilter.trim() === '') {
            return true;
          }
          
          const filter = this.stepFilter.toLowerCase().trim();
          const nameMatch = (name || '').toLowerCase().includes(filter);
          const descMatch = (description || '').toLowerCase().includes(filter);
          
          return nameMatch || descMatch;
        },
        
        hasMatchingSteps(items) {
          // Recursively check if any steps in items/nested items match the search filter
          if (!items || !Array.isArray(items)) return true; // Show if no items
          if (!this.stepFilter || this.stepFilter.trim() === '') return true; // Show if no filter
          
          for (let item of items) {
            if (item && item.type === 'step') {
              if (this.matchesSearchFilter(item.name, item.data?.description)) {
                return true;
              }
            }
            if (item && item.type === 'reusable' && item.data) {
              if (this.hasMatchingSteps(item.data)) {
                return true;
              }
            }
          }
          return false;
        },
        
        toggleReusable(iterIdx, itemIdx) {
          const key = `${iterIdx}-${itemIdx}`;
          if (this.expandedReusables.has(key)) {
            this.expandedReusables.delete(key);
          } else {
            this.expandedReusables.add(key);
          }
          // Trigger reactivity
          this.expandedReusables = new Set(this.expandedReusables);
        },
        
        isReusableExpanded(iterIdx, itemIdx, itemData) {
          const key = `${iterIdx}-${itemIdx}`;
          // Auto-expand if there's an active search filter and this reusable has matching steps
          if ((this.stepFilter || '').trim() !== '') {
            return this.expandedReusables.has(key) || this.hasMatchingSteps(itemData);
          }
          return this.expandedReusables.has(key);
        },
        
        toggleTheme() {
          this.isDark = !this.isDark;
          localStorage.setItem('ingenious-report-theme', this.isDark ? 'dark' : 'light');
          this.applyTheme();
        },
        
        applyTheme() {
          const lightTheme = document.getElementById('theme-light');
          const darkTheme = document.getElementById('theme-dark');
          
          if (this.isDark) {
            document.documentElement.classList.add('dark');
            lightTheme.disabled = true;
            darkTheme.disabled = false;
          } else {
            document.documentElement.classList.remove('dark');
            lightTheme.disabled = false;
            darkTheme.disabled = true;
          }
        },
        
        toggleStep(index) {
          if (this.expandedSteps.has(index)) {
            this.expandedSteps.delete(index);
          } else {
            this.expandedSteps.add(index);
          }
          // Trigger reactivity
          this.expandedSteps = new Set(this.expandedSteps);
        },
        
        isExpanded(index) {
          return this.expandedSteps.has(index);
        },
        
        expandAll() {
          // Expand all reusables in current iterations
          const iterations = this.getAllIterations();
          iterations.forEach((iteration, iterIdx) => {
            if (iteration.data) {
              iteration.data.forEach((item, itemIdx) => {
                if (item.type === 'reusable') {
                  this.expandedReusables.add(`${iterIdx}-${itemIdx}`);
                }
              });
            }
          });
          this.expandedReusables = new Set(this.expandedReusables);
          
          // Expand all steps
          this.expandedSteps = new Set(this.visibleSteps.map((_, i) => i));
        },
        
        collapseAll() {
          this.expandedSteps = new Set();
          this.expandedReusables = new Set();
        },
        
        isImageLink(link) {
          if (!link) return false;
          const lower = link.toLowerCase();
          return lower.endsWith('.png') || lower.endsWith('.jpg') || lower.endsWith('.jpeg') || lower.endsWith('.gif') || lower.endsWith('.webp');
        },
        
        isVideoLink(link) {
          if (!link) return false;
          const lower = link.toLowerCase();
          return lower.endsWith('.mp4') || lower.endsWith('.webm') || lower.endsWith('.avi') || lower.endsWith('.mov');
        },

        getHttpMethod(step) {
          if (!step) return null;
          const text = [
            step.data?.stepName,
            step.data?.action,
            step.data?.description,
            step.name
          ].filter(Boolean).join(' ');
          const match = text.match(/\b(GET|POST|PUT|PATCH|DELETE)\b/i);
          return match ? match[1].toUpperCase() : null;
        },

        isPayloadLink(link, step) {
          if (!link) return false;
          if (this.isImageLink(link) || this.isVideoLink(link)) return false;
          const method = this.getHttpMethod(step);
          if (method) return true;
          const normalized = this.normalizeFilePath(link);
          const lastSegment = normalized.split('/').pop() || '';
          if (lastSegment.endsWith('Request.txt') || lastSegment.endsWith('Response.txt')) {
            return true;
          }
          if (normalized.includes('/webservice/')) return true;
          return !lastSegment.includes('.');
        },

        normalizeFilePath(path) {
          if (!path) return '';
          return path.replace(/\\/g, '/');
        },

        toRelativePath(fromDir, toPath) {
          if (!fromDir || !toPath) return toPath;
          const fromParts = fromDir.split('/').filter(Boolean);
          const toParts = toPath.split('/').filter(Boolean);
          while (fromParts.length && toParts.length && fromParts[0] === toParts[0]) {
            fromParts.shift();
            toParts.shift();
          }
          const up = '../'.repeat(fromParts.length);
          return `${up}${toParts.join('/')}` || './';
        },

        resolvePayloadBase(link) {
          if (!link) return '';
          const normalized = this.normalizeFilePath(link);
          if (normalized.startsWith('http://') || normalized.startsWith('https://')) {
            return normalized;
          }

          let base = normalized;
          if (base.endsWith('Request.txt')) {
            base = base.slice(0, -'Request.txt'.length);
          } else if (base.endsWith('Response.txt')) {
            base = base.slice(0, -'Response.txt'.length);
          }
          if (base.startsWith('/')) {
            const windowPath = window.location.pathname || '';
            if (windowPath.includes('/Results/') && base.includes('/Results/')) {
              const reportDir = windowPath.substring(0, windowPath.lastIndexOf('/') + 1);
              const relativePath = this.toRelativePath(reportDir, base);
              return relativePath;
            }
          }
          return base;
        },

        encodePayloadUrl(url) {
          if (!url) return '';
          return encodeURI(url);
        },

        async fetchPayloadFile(url) {
          try {
            const response = await fetch(url, { cache: 'no-store' });
            if (!response.ok) return '';
            const text = await response.text();
            return text;
          } catch (error) {
            return '';
          }
        },

        formatPayload(text, isHtml = true) {
          if (!text) return '';
          const trimmed = text.trim();
          if (!trimmed) return '';
          if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
            try {
              const formatted = JSON.stringify(JSON.parse(trimmed), null, 2);
              return isHtml ? this.colorizeJson(formatted) : formatted;
            } catch (error) {
              return this.escapeHtml(text);
            }
          }
          if (trimmed.startsWith('<')) {
            const formatted = this.prettyPrintXml(trimmed);
            return isHtml ? this.colorizeXml(formatted) : formatted;
          }
          return this.escapeHtml(text);
        },

        colorizeJson(json) {
          return json
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?/g, (match) => {
              let cls = 'json-number';
              if (/^"/.test(match)) {
                if (/:$/.test(match)) {
                  cls = 'json-key';
                } else {
                  cls = 'json-string';
                }
              } else if (/true|false/.test(match)) {
                cls = 'json-boolean';
              } else if (/null/.test(match)) {
                cls = 'json-null';
              }
              return `<span class="${cls}">${match}</span>`;
            });
        },

        colorizeXml(xml) {
          return xml
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/(&lt;\/?)([:\w-]+)((?:\s+[:\w-]+(?:=(?:"[^"]*"|'[^']*'))?)*)(\s*\/?&gt;)/g, (match, open, tag, attrs, close) => {
              let result = `<span class="xml-bracket">${open}</span><span class="xml-tag">${tag}</span>`;
              if (attrs) {
                result += attrs.replace(/([:\w-]+)(=)(("[^"]*"|'[^']*'))/g, 
                  (m, name, eq, value) => `<span class="xml-attr-name">${name}</span><span class="xml-bracket">${eq}</span><span class="xml-attr-value">${value}</span>`);
              }
              result += `<span class="xml-bracket">${close}</span>`;
              return result;
            })
            .replace(/(&lt;!--)(.*?)(--&gt;)/g, '<span class="xml-comment">$1$2$3</span>');
        },

        prettyPrintXml(xml) {
          try {
            const parsed = new DOMParser().parseFromString(xml, 'application/xml');
            if (parsed.getElementsByTagName('parsererror').length) {
              return xml;
            }
            const serialized = new XMLSerializer().serializeToString(parsed);
            const formatted = serialized
              .replace(/></g, '>$\n<')
              .split('$\n')
              .reduce((acc, line) => {
                let indent = acc.indent;
                if (line.match(/^<\//)) indent = Math.max(indent - 2, 0);
                acc.output.push(' '.repeat(indent) + line);
                if (line.match(/^<[^!?][^>]*[^/]>/) && !line.includes('</')) {
                  indent += 2;
                }
                acc.indent = indent;
                return acc;
              }, { output: [], indent: 0 }).output
              .join('\n');
            return formatted;
          } catch (error) {
            return xml;
          }
        },

        escapeHtml(text) {
          if (!text) return '';
          return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        },

        async openPayloadModal(link, step) {
          if (!link) return;
          const method = this.getHttpMethod(step);
          // Check if payloads are embedded in the step data (new method to avoid CORS issues)
          let rawRequest = '';
          let rawResponse = '';
          if (step.data && step.data.requestPayload) {
            rawRequest = step.data.requestPayload;
          }

          if (step.data && step.data.responsePayload) {
            rawResponse = step.data.responsePayload;
          }

          // Fallback to file fetching (legacy, will fail with file:// protocol due to CORS)
          if (!rawRequest && !rawResponse) {
            const basePath = this.resolvePayloadBase(link);

            const requestUrl = this.encodePayloadUrl(`${basePath}Request.txt`);
            const responseUrl = this.encodePayloadUrl(`${basePath}Response.txt`);

            const results = await Promise.all([
              this.fetchPayloadFile(requestUrl),
              this.fetchPayloadFile(responseUrl)
            ]);

            rawRequest = results[0];
            rawResponse = results[1];
          }

          const requestText = this.formatPayload(rawRequest);
          const responseText = this.formatPayload(rawResponse);
          const showRequest = !!requestText && (!method || ['POST', 'PUT', 'PATCH'].includes(method));
          const showResponse = !!responseText;

          const modal = document.createElement('div');
          modal.className = 'payload-modal-overlay';

          const requestHtml = showRequest
            ? `
              <div style="margin-bottom: 1.5rem;">
                <h3 style="color: #ffffff; margin: 0 0 0.5rem 0; font-size: 1rem; font-weight: 600;">Request Payload</h3>
                <pre style="white-space: pre-wrap; word-wrap: break-word; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 1rem; color: #e5e7eb; font-size: 0.875rem; line-height: 1.4;">${requestText}</pre>
              </div>
            `
            : '';

          const responseHtml = showResponse
            ? `
              <div style="margin-bottom: 1.5rem;">
                <h3 style="color: #ffffff; margin: 0 0 0.5rem 0; font-size: 1rem; font-weight: 600;">Response Payload</h3>
                <pre style="white-space: pre-wrap; word-wrap: break-word; background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; padding: 1rem; color: #e5e7eb; font-size: 0.875rem; line-height: 1.4;">${responseText}</pre>
              </div>
            `
            : `
              <div style="color: rgba(255, 255, 255, 0.7); font-size: 0.9rem;">No response payload found.</div>
            `;

          modal.innerHTML = `
            <div style="position: fixed; inset: 0; background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(8px); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 2rem;">
              <div style="position: absolute; inset: 0;" onclick="this.closest('.payload-modal-overlay').remove()"></div>
              <div style="position: relative; z-index: 10000; background: rgba(17, 24, 39, 0.95); border: 1px solid rgba(180, 135, 255, 0.35); border-radius: 1rem; max-width: 90vw; width: 900px; max-height: 85vh; overflow-y: auto; padding: 1.75rem; box-shadow: 0 0 60px rgba(180, 135, 255, 0.25);">
                <button onclick="this.closest('.payload-modal-overlay').remove()" style="position: absolute; top: 1rem; right: 1rem; background: rgba(180, 135, 255, 0.2); border: 1px solid rgba(180, 135, 255, 0.5); color: white; border-radius: 0.5rem; padding: 0.5rem; cursor: pointer;" title="Close">
                  <svg style="width: 1.25rem; height: 1.25rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                  </svg>
                </button>
                <div style="margin-bottom: 1rem;">
                  <h2 style="color: #C6A6FF; margin: 0 0 0.5rem 0; font-size: 1.25rem; font-weight: 700;">API Payload</h2>
                  <p style="color: rgba(255, 255, 255, 0.7); margin: 0; font-size: 0.875rem;">${method ? method + ' request' : 'Request/Response details'}</p>
                </div>
                ${requestHtml}
                ${responseHtml}
              </div>
            </div>
          `;

          const escHandler = (event) => {
            if (event.key === 'Escape') {
              modal.remove();
              document.removeEventListener('keydown', escHandler);
            }
          };
          document.addEventListener('keydown', escHandler);
          document.body.appendChild(modal);
        },
        
        normalizePath(path) {
          if (!path) return '';
          // Convert backslashes to forward slashes
          let normalized = path.replace(/\\/g, '/');
          // Remove leading slash (since HTML and img are at same directory level)
          if (normalized.startsWith('/')) {
            normalized = normalized.substring(1);
          }
          return normalized;
        },
        
        openScreenshot(src) {
          const normalizedSrc = this.normalizePath(src);
          this.lightboxSrc = normalizedSrc;
          this.lightboxOpen = true;
        },
        
        openVideo(src) {
          const normalizedSrc = this.normalizePath(src);
          this.videoSrc = normalizedSrc;
          this.videoOpen = true;
        },
        
        openTestCaseVideo(src) {
          const normalizedSrc = this.normalizePath(src);
          this.videoSrc = normalizedSrc;
          this.videoOpen = true;
        },
        
        getAbsoluteTracePath() {
          // Get trace path from data (already populated by Java backend)
          if (!this.currentDetails.tracePath) return '';
          
          // Get the base directory from the report's location
          const path = decodeURIComponent(window.location.pathname || '');
          const lastSlash = path.lastIndexOf('/');
          if (lastSlash === -1) return '';
          
          const reportDir = path.substring(0, lastSlash + 1);
          // Combine report directory with the relative trace path and return as proper file URL
          return reportDir + this.currentDetails.tracePath;
        },
        
        hasAxeReport() {
          // Check if axe report file exists for this test case
          const scenario = (this.params.SC || this.currentDetails.scenarioName || '').trim();
          const testcase = (this.params.TC || this.currentDetails.testcaseName || '').trim();
          return scenario && testcase;
        },
        
        getAxeReportPath() {
          // Build path to axe report JSON
          if (!this.hasAxeReport()) return '';
          
          const scenario = this.params.SC || this.currentDetails.scenarioName || '';
          const testcase = this.params.TC || this.currentDetails.testcaseName || '';
          
          // Use RELATIVE path from viewer's perspective
          // Path format: aXe/ScenarioName_TestCaseName_axe-results.json
          return `aXe/${scenario}_${testcase}_axe-results.json`;
        },
        
        getAxeReportUrl() {
          // Generate URL to open axe viewer with the report data
          if (!this.hasAxeReport()) return '#';
          
          // Get the full path to the aXe JSON file (includes reportDir)
          const fullPath = this.getAxeReportPath();
          
          // Open viewer with full path to JSON file
          // This allows the viewer's fetch() to correctly locate the file
          return `axe-viewer.html?axePath=${encodeURIComponent(fullPath)}`;
        },
        
        isTestAccessibilityStep(step) {
          // Check if a step is executing testAccessibility action
          if (!step || !step.data) return false;
          const action = (step.data?.action || step.data?.stepName || '').toLowerCase();
          return action.includes('accessibility') || action.includes('testaccessibility');
        },
        
        getReusableAxeReportPath(reusableName) {
          // Build path to axe report for a specific reusable
          if (!reusableName) return '';
          
          // Extract just the reusable name after the colon (e.g., "Workflow:Applicant" → "Applicant")
          const cleanName = reusableName.includes(':') 
            ? reusableName.split(':')[1].trim() 
            : reusableName.trim();
          
          const scenario = this.params.SC || this.currentDetails.scenarioName || '';
          
          if (!scenario) return '';
          
          // Use RELATIVE path from viewer's perspective (both HTML files are in same directory)
          // Path format: aXe/ScenarioName_ReusableName_axe-results.json
          return `aXe/${scenario}_${cleanName}_axe-results.json`;
        },
        
        getReusableAxeReportUrl(reusableName) {
          // Generate URL to open axe viewer for a specific reusable
          if (!reusableName) return '#';
          
          const fullPath = this.getReusableAxeReportPath(reusableName);
          if (!fullPath) return '#';
          
          return `axe-viewer.html?axePath=${encodeURIComponent(fullPath)}`;
        },
        
        // aXe Modal Methods
        axeModal: {
          isOpen: false,
          title: '',
          data: { violations: [], passes: [], incomplete: [], inapplicable: [] },
          activeTab: 'violations',
          stats: { violations: 0, passes: 0, incomplete: 0, inapplicable: 0 },
          error: ''
        },
        
        openAxeReportModal(reusableName, jsonPath) {
          this.axeModal.isOpen = true;
          this.axeModal.title = reusableName;
          this.axeModal.error = '';
          this.axeModal.data = { violations: [], passes: [], incomplete: [], inapplicable: [] };
          
          console.log('[aXe Modal] openAxeReportModal called with reusableName:', reusableName);
          
          // Extract clean reusable name (remove "Workflow:" prefix if present)
          const cleanReusableName = reusableName.includes(':') 
            ? reusableName.split(':')[1].trim() 
            : reusableName;
          
          console.log('[aXe Modal] Clean reusable name:', cleanReusableName);
          
          // First, try to check if data is embedded in the page
          const embeddedDataId = 'axe-data-' + cleanReusableName.replace(/[^a-zA-Z0-9]/g, '-');
          console.log('[aXe Modal] Looking for embedded data ID:', embeddedDataId);
          
          // Log all script IDs with axe-data-
          const allAxeScripts = document.querySelectorAll('script[id^="axe-data-"]');
          console.log('[aXe Modal] Found', allAxeScripts.length, 'embedded aXe data scripts via querySelectorAll');
          
          // Try alternative method: geElementsByTagName
          const allScripts = document.getElementsByTagName('script');
          console.log('[aXe Modal] Total <script> tags in document:', allScripts.length);
          for (let i = 0; i < allScripts.length; i++) {
            if (allScripts[i].id && allScripts[i].id.startsWith('axe-data-')) {
              console.log('[aXe Modal]   Found via getElementsByTagName:', allScripts[i].id);
            }
          }
          
          allAxeScripts.forEach((script, idx) => {
            console.log('[aXe Modal] Available script', idx + 1, ':', script.id);
          });
          
          const embeddedElement = document.getElementById(embeddedDataId);
          console.log('[aXe Modal] Direct getElementById result:', embeddedElement ? 'FOUND' : 'NOT FOUND');
          
          if (embeddedElement) {
            console.log('[aXe Modal] Element type:', embeddedElement.tagName);
            console.log('[aXe Modal] Element id:', embeddedElement.id);
            console.log('[aXe Modal] Content length:', embeddedElement.textContent?.length || 0);
          }
          
          if (embeddedElement && embeddedElement.textContent) {
            console.log('[aXe Modal] Found embedded data for:', cleanReusableName, '(ID:', embeddedDataId + ')');
            console.log('[aXe Modal] Embedded data size:', embeddedElement.textContent.length, 'bytes');
            try {
              this.axeModal.data = JSON.parse(embeddedElement.textContent);
              console.log('[aXe Modal] Successfully parsed embedded data, violations:', this.axeModal.data.violations?.length || 0);
              this.processAxeResults();
              return;
            } catch (e) {
              console.error('[aXe Modal] Failed to parse embedded data:', e);
            }
          }
          
          // Otherwise, try to load from file
          this.loadAxeReportData(jsonPath);
        },
        
        closeAxeModal() {
          this.axeModal.isOpen = false;
          this.axeModal.data = { violations: [], passes: [], incomplete: [], inapplicable: [] };
        },
        
        loadAxeReportData(jsonPath) {
          if (!jsonPath) {
            this.axeModal.error = 'No accessibility report path provided';
            return;
          }
          
          // Convert relative path to absolute file:// URL
          const currentUrl = window.location.href;
          const currentDir = currentUrl.substring(0, currentUrl.lastIndexOf('/') + 1);
          const absolutePath = currentDir + jsonPath;
          
          // Decode URL-encoded characters (%20 -> space, %2001 -> 01, etc.)
          const decodedPath = decodeURIComponent(absolutePath);
          
          console.log('[aXe Modal] Attempting to load from:', jsonPath);
          console.log('[aXe Modal] Full decoded URL:', decodedPath);
          console.log('[aXe Modal] Current window.location:', window.location.href);
          
          // Create a test to verify file accessibility
          const testXhr = new XMLHttpRequest();
          testXhr.onload = () => {
            console.log('[aXe Modal] Test XHR succeeded, status:', testXhr.status, 'statusText:', testXhr.statusText);
            this.loadWithXhr(decodedPath);
          };
          testXhr.onerror = () => {
            console.error('[aXe Modal] Test XHR failed - browser may be blocking file:// access');
            console.log('[aXe Modal] Trying alternative approach...');
            this.loadWithAltMethod(decodedPath);
          };
          testXhr.ontimeout = () => {
            console.error('[aXe Modal] Test XHR timed out');
            this.loadWithAltMethod(decodedPath);
          };
          
          try {
            testXhr.open('GET', decodedPath, true);
            testXhr.timeout = 5000;
            testXhr.responseType = 'text';
            testXhr.send();
          } catch (e) {
            console.error('[aXe Modal] XHR creation error:', e.message);
            this.axeModal.error = 'Browser security restrictions prevent loading local files. Please check the browser console for details.';
          }
        },
        
        loadWithXhr(decodedPath) {
          const xhr = new XMLHttpRequest();
          
          xhr.onload = () => {
            try {
              console.log('[aXe Modal] XHR load successful, response length:', xhr.responseText.length);
              const data = JSON.parse(xhr.responseText);
              console.log('[aXe Modal] JSON parsed successfully, violations:', data.violations?.length || 0);
              this.axeModal.data = data;
              this.processAxeResults();
            } catch (e) {
              console.error('[aXe Modal] JSON parse error:', e.message);
              this.axeModal.error = 'Failed to parse accessibility report JSON: ' + e.message;
            }
          };
          
          xhr.onerror = () => {
            console.error('[aXe Modal] XHR load error, status:', xhr.status);
            this.axeModal.error = 'Browser blocked file access (security restriction). Consider opening the aXe report from a web server instead of file:// protocol.';
          };
          
          try {
            xhr.open('GET', decodedPath, true);
            xhr.responseType = 'text';
            xhr.send();
          } catch (e) {
            console.error('[aXe Modal] XHR send error:', e.message);
            this.axeModal.error = 'Error loading file: ' + e.message;
          }
        },
        
        loadWithAltMethod(decodedPath) {
          // Try using fetch as alternative
          console.log('[aXe Modal] Attempting fetch API...');
          fetch(decodedPath, { mode: 'no-cors' })
            .then(response => {
              console.log('[aXe Modal] Fetch response status:', response.status);
              // For file:// URLs with no-cors, status is always 0 on success
              return response.text();
            })
            .then(text => {
              console.log('[aXe Modal] Fetch succeeded, text length:', text.length);
              if (!text || text.trim().length === 0) {
                throw new Error('Empty response from fetch');
              }
              const data = JSON.parse(text);
              this.axeModal.data = data;
              this.processAxeResults();
            })
            .catch(err => {
              console.error('[aXe Modal] All loading methods failed:', err.message);
              console.log('[aXe Modal] Data is now:', this.axeModal.data);
              this.axeModal.error = 'Could not load accessibility report. The most reliable solution is to:<br/>1. Backend embedding: Embedded data not found in HTML<br/>2. Use a web server instead of file:// protocol<br/>3. Check browser console for detailed error logs';
            });
        },
        
        processAxeResults() {
          if (!this.axeModal.data || !this.axeModal.data.violations) return;
          
          this.axeModal.stats = {
            violations: Array.isArray(this.axeModal.data.violations) ? this.axeModal.data.violations.length : 0,
            passes: Array.isArray(this.axeModal.data.passes) ? this.axeModal.data.passes.length : 0,
            incomplete: Array.isArray(this.axeModal.data.incomplete) ? this.axeModal.data.incomplete.length : 0,
            inapplicable: Array.isArray(this.axeModal.data.inapplicable) ? this.axeModal.data.inapplicable.length : 0
          };
          
          // Set active tab based on violations
          if (this.axeModal.stats.violations > 0) {
            this.axeModal.activeTab = 'violations';
          } else if (this.axeModal.stats.passes > 0) {
            this.axeModal.activeTab = 'passes';
          } else if (this.axeModal.stats.incomplete > 0) {
            this.axeModal.activeTab = 'incomplete';
          } else {
            this.axeModal.activeTab = 'inapplicable';
          }
        },
        
        getImpactClass(impact) {
          const impactClasses = {
            'critical': 'bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-400',
            'serious': 'bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-400',
            'moderate': 'bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-400',
            'minor': 'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400'
          };
          return impactClasses[impact] || impactClasses['minor'];
        },

        // Track expanded states for violations and nodes
        expandedViolations: {},
        expandedNodes: {},
        
        toggleViolation(violationId) {
          this.expandedViolations[violationId] = !this.expandedViolations[violationId];
        },
        
        isViolationExpanded(violationId) {
          return this.expandedViolations[violationId] || false;
        },
        
        toggleNode(violationId, nodeIdx) {
          const key = `${violationId}-${nodeIdx}`;
          this.expandedNodes[key] = !this.expandedNodes[key];
        },
        
        isNodeExpanded(violationId, nodeIdx) {
          const key = `${violationId}-${nodeIdx}`;
          return this.expandedNodes[key] || false;
        },
        
        formatSelector(target) {
          if (!target || !Array.isArray(target) || target.length === 0) return 'N/A';
          return target.flat().join(', ');
        },
        
        getWcagTags(tags) {
          if (!tags || !Array.isArray(tags)) return [];
          return tags.filter(tag => tag.startsWith('wcag') || tag.startsWith('section508') || tag.startsWith('EN-'));
        },
        
        colorCodeHtml(html) {
          if (!html) return '';
          // Escape HTML entities first
          let escaped = html
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
          
          // Color comments - gray
          escaped = escaped.replace(/&lt;!--[\s\S]*?--&gt;/g, 
            match => `<span class="text-gray-500">${match}</span>`);
          
          // Color tags and attributes
          escaped = escaped.replace(/&lt;(\/?)?(\w[\w:-]*?)([\s\S]*?)&gt;/g, 
            (match, slash, tagName, attrs) => {
              // Color tag
              let result = `<span class="text-blue-600">&lt;${slash || ''}${tagName}</span>`;
              
              // Color attributes inside tags
              if (attrs && attrs.length > 0) {
                attrs = attrs
                  // Color attribute names
                  .replace(/\s+([\w:-]+)=/g, ' <span class="text-red-600">$1</span>=')
                  // Color attribute values
                  .replace(/=(["'])([^"']*?)\1/g, '=<span class="text-green-600">$1$2$1</span>');
                result += attrs;
              }
              
              // Color closing bracket
              result += `<span class="text-blue-600">&gt;</span>`;
              return result;
            });
          
          return escaped;
        }
      };
    }
  </script>
