                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                            <span class="text-sm font-semibold text-gray-900">Element <span x-text="nIdx + 1"></span></span>
                            <template x-if="node.impact">
                              <span class="ml-auto px-2 py-1 rounded text-xs font-semibold" :class="getImpactClass(node.impact)" x-text="node.impact"></span>
                            </template>
                          </div>
                          
                          <div x-show="isNodeExpanded(violation.id, nIdx)" x-collapse class="p-3 bg-white dark:bg-gray-900 space-y-3">
                            <div>
                              <p class="text-xs font-semibold text-gray-500 mb-1">CSS Selector:</p>
                              <code class="block text-xs bg-gray-100 dark:bg-gray-800 p-2 rounded border border-gray-200 dark:border-gray-700 font-mono text-purple-700 overflow-x-auto" x-text="formatSelector(node.target)"></code>
                            </div>
                            
                            <!-- HTML Source -->
                            <div>
                              <p class="text-xs font-semibold text-gray-500 mb-1">HTML Source:</p>
                              <pre class="text-xs bg-gray-100 dark:bg-gray-800 p-3 rounded border border-gray-200 dark:border-gray-700 overflow-x-auto"><code class="font-mono" x-html="colorCodeHtml(node.html)"></code></pre>
                            </div>
                            <template x-if="node.failureSummary">
                              <div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded p-3">
                                <p class="text-xs font-semibold text-red-900 mb-1">Failure Summary:</p>
                                <p class="text-xs text-red-800 whitespace-pre-wrap" x-text="node.failureSummary"></p>
                              </div>
                            </template>
                            <template x-if="node.any?.length > 0 || node.all?.length > 0 || node.none?.length > 0">
                              <div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded p-3">
                                <p class="text-xs font-semibold text-green-900 mb-2">Fix Suggestions:</p>
                                <div class="space-y-2 text-xs">
                                  <template x-for="check in node.any" :key="check.id">
                                    <div class="flex items-start gap-2">
                                      <span class="text-green-600 mt-0.5">•</span>
                                      <span class="text-green-800" x-text="check.message"></span>
                                    </div>
                                  </template>
                                  <template x-for="check in node.all" :key="check.id">
                                    <div class="flex items-start gap-2">
                                      <span class="text-green-600 mt-0.5">•</span>
                                      <span class="text-green-800" x-text="check.message"></span>
                                    </div>
                                  </template>
                                  <template x-for="check in node.none" :key="check.id">
                                    <div class="flex items-start gap-2">
                                      <span class="text-green-600 mt-0.5">•</span>
                                      <span class="text-green-800" x-text="check.message"></span>
                                    </div>
                                  </template>
                                </div>
                              </div>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
        
        <!-- Passes Tab -->
        <div x-show="axeModal.activeTab === 'passes'" class="space-y-4">
          <template x-if="axeModal.stats.passes === 0">
            <div class="bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg p-6 text-center">
              <p class="text-gray-600">No accessibility passes recorded.</p>
            </div>
          </template>
          <template x-if="axeModal.stats.passes > 0" x-for="(pass, pIdx) in axeModal.data.passes" :key="pass.id">
            <div class="border border-green-300 dark:border-green-800 rounded-lg overflow-hidden shadow-sm hover:shadow-md transition-shadow">
              <div @click="toggleViolation('pass-' + pass.id)" class="cursor-pointer bg-green-50 dark:bg-green-900/20 p-4 hover:bg-green-100 dark:hover:bg-green-900/30 transition-colors">
                <div class="flex items-start justify-between mb-2">
                  <div class="flex items-center gap-3 flex-1">
                    <svg class="w-5 h-5 text-green-600 transform transition-transform" :class="{ 'rotate-90': isViolationExpanded('pass-' + pass.id) }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                    <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    <h4 class="font-bold text-gray-900 text-lg" x-text="pass.id"></h4>
                  </div>
                </div>
                <p class="text-gray-700 mb-2 ml-8" x-text="pass.description"></p>
                <div class="flex items-center gap-4 ml-8 text-sm">
                  <span class="text-gray-600">
                    <strong x-text="pass.nodes?.length || 0"></strong> passing element<span x-show="(pass.nodes?.length || 0) !== 1">s</span>
                  </span>
                  <template x-if="pass.helpUrl">
                    <a :href="pass.helpUrl" target="_blank" class="text-blue-600 hover:underline flex items-center gap-1" @click.stop>
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                      </svg>
                      Learn More
                    </a>
                  </template>
                </div>
                <!-- WCAG Tags -->
                <template x-if="getWcagTags(pass.tags).length > 0">
                  <div class="flex flex-wrap gap-2 mt-3 ml-8">
                    <template x-for="tag in getWcagTags(pass.tags)" :key="tag">
                      <span class="px-2 py-1 bg-indigo-100 dark:bg-indigo-900/30 text-indigo-800 text-xs rounded-md font-medium" x-text="tag.toUpperCase()"></span>
                    </template>
                  </div>
                </template>
              </div>
              
              <!-- Pass Details (Expandable) -->
              <div x-show="isViolationExpanded('pass-' + pass.id)" x-collapse class="bg-white dark:bg-gray-800 border-t border-green-200 dark:border-green-800">
                <div class="p-4 space-y-4">
                  <div class="bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-500 p-3 rounded-r">
                    <p class="text-sm font-semibold text-blue-900 mb-1">What Passed:</p>
                    <p class="text-sm text-blue-800" x-text="pass.help"></p>
                  </div>
                  <div>
                    <h5 class="font-bold text-gray-900 mb-3 flex items-center gap-2">
                      <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                      </svg>
                      Passing Elements (<span x-text="pass.nodes?.length || 0"></span>)
                    </h5>
                    <div class="space-y-3">
                      <template x-for="(node, nIdx) in pass.nodes" :key="nIdx">
                        <div class="border border-green-300 dark:border-green-700 rounded-lg overflow-hidden">
                          <div @click="toggleNode('pass-' + pass.id, nIdx)" class="cursor-pointer bg-green-50 dark:bg-green-800/50 p-3 hover:bg-green-100 dark:hover:bg-green-800 transition-colors flex items-center gap-2">
                            <svg class="w-4 h-4 text-green-600 transform transition-transform" :class="{ 'rotate-90': isNodeExpanded('pass-' + pass.id, nIdx) }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                            <span class="text-sm font-semibold text-gray-900">Element <span x-text="nIdx + 1"></span></span>
                          </div>
                          
                          <div x-show="isNodeExpanded('pass-' + pass.id, nIdx)" x-collapse class="p-3 bg-white dark:bg-gray-900 space-y-3">
                            <div>
                              <p class="text-xs font-semibold text-gray-500 mb-1">CSS Selector:</p>
                              <code class="block text-xs bg-gray-100 dark:bg-gray-800 p-2 rounded border border-gray-200 dark:border-gray-700 font-mono text-purple-700 overflow-x-auto" x-text="formatSelector(node.target)"></code>
                            </div>
                            
                            <!-- HTML Source -->
                            <div>
                              <p class="text-xs font-semibold text-gray-500 mb-1">HTML Source:</p>
                              <pre class="text-xs bg-gray-100 dark:bg-gray-800 p-3 rounded border border-gray-200 dark:border-gray-700 overflow-x-auto"><code class="font-mono" x-html="colorCodeHtml(node.html)"></code></pre>
                            </div>
                            <template x-if="node.all?.length > 0">
                              <div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded p-3">
                                <p class="text-xs font-semibold text-green-900 mb-2">Success Criteria Met:</p>
                                <div class="space-y-2 text-xs">
                                  <template x-for="check in node.all" :key="check.id">
                                    <div class="flex items-start gap-2">
                                      <span class="text-green-600 mt-0.5">✓</span>
                                      <span class="text-green-800" x-text="check.message"></span>
                                    </div>
                                  </template>
                                </div>
                              </div>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
        
        <!-- Incomplete Tab -->
        <div x-show="axeModal.activeTab === 'incomplete'" class="space-y-4">
          <template x-if="axeModal.stats.incomplete === 0">
            <div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-lg p-6 text-center">
              <p class="text-green-800 font-semibold">No incomplete checks - all rules could be verified!</p>
            </div>
          </template>
          <template x-if="axeModal.stats.incomplete > 0" x-for="(incomplete, iIdx) in axeModal.data.incomplete" :key="incomplete.id">
            <div class="border border-yellow-300 dark:border-yellow-800 rounded-lg overflow-hidden shadow-sm hover:shadow-md transition-shadow">
              <div @click="toggleViolation('incomplete-' + incomplete.id)" class="cursor-pointer bg-yellow-50 dark:bg-yellow-900/20 p-4 hover:bg-yellow-100 dark:hover:bg-yellow-900/30 transition-colors">
                <div class="flex items-start justify-between mb-2">
                  <div class="flex items-center gap-3 flex-1">
                    <svg class="w-5 h-5 text-yellow-600 transform transition-transform" :class="{ 'rotate-90': isViolationExpanded('incomplete-' + incomplete.id) }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                    <svg class="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                    </svg>
                    <h4 class="font-bold text-gray-900 text-lg" x-text="incomplete.id"></h4>
                  </div>
                  <template x-if="incomplete.impact">
                    <span class="px-3 py-1 rounded-full text-xs font-bold bg-yellow-100 dark:bg-yellow-900/30 text-yellow-800" x-text="incomplete.impact?.toUpperCase()"></span>
                  </template>
                </div>
                <p class="text-gray-700 mb-2 ml-8" x-text="incomplete.description"></p>
                <div class="flex items-center gap-4 ml-8 text-sm">
                  <span class="text-gray-600">
                    <strong x-text="incomplete.nodes?.length || 0"></strong> element<span x-show="(incomplete.nodes?.length || 0) !== 1">s</span> to review
                  </span>
                  <template x-if="incomplete.helpUrl">
                    <a :href="incomplete.helpUrl" target="_blank" class="text-blue-600 hover:underline flex items-center gap-1" @click.stop>
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                      </svg>
                      Learn More
                    </a>
                  </template>
                </div>
                <!-- WCAG Tags -->
                <template x-if="getWcagTags(incomplete.tags).length > 0">
                  <div class="flex flex-wrap gap-2 mt-3 ml-8">
                    <template x-for="tag in getWcagTags(incomplete.tags)" :key="tag">
                      <span class="px-2 py-1 bg-indigo-100 dark:bg-indigo-900/30 text-indigo-800 text-xs rounded-md font-medium" x-text="tag.toUpperCase()"></span>
                    </template>
                  </div>
                </template>
              </div>
              
              <!-- Incomplete Details (Expandable) -->
              <div x-show="isViolationExpanded('incomplete-' + incomplete.id)" x-collapse class="bg-white dark:bg-gray-800 border-t border-yellow-200 dark:border-yellow-800">
                <div class="p-4 space-y-4">
                  <div class="bg-blue-50 dark:bg-blue-900/20 border-l-4 border-blue-500 p-3 rounded-r">
                    <p class="text-sm font-semibold text-blue-900 mb-1">What to Review:</p>
                    <p class="text-sm text-blue-800" x-text="incomplete.help"></p>
                  </div>
                  <div>
                    <h5 class="font-bold text-gray-900 mb-3 flex items-center gap-2">
                      <svg class="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                      </svg>
                      Elements to Review (<span x-text="incomplete.nodes?.length || 0"></span>)
                    </h5>
                    <div class="space-y-3">
                      <template x-for="(node, nIdx) in incomplete.nodes" :key="nIdx">
                        <div class="border border-yellow-300 dark:border-yellow-700 rounded-lg overflow-hidden">
                          <div @click="toggleNode('incomplete-' + incomplete.id, nIdx)" class="cursor-pointer bg-yellow-50 dark:bg-yellow-800/50 p-3 hover:bg-yellow-100 dark:hover:bg-yellow-800 transition-colors flex items-center gap-2">
                            <svg class="w-4 h-4 text-yellow-600 transform transition-transform" :class="{ 'rotate-90': isNodeExpanded('incomplete-' + incomplete.id, nIdx) }" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                            </svg>
                            <span class="text-sm font-semibold text-gray-900">Element <span x-text="nIdx + 1"></span></span>
                            <template x-if="node.impact">
                              <span class="ml-auto px-2 py-1 rounded text-xs font-semibold bg-yellow-100 dark:bg-yellow-900/30 text-yellow-800" x-text="node.impact"></span>
                            </template>
                          </div>
                          
                          <div x-show="isNodeExpanded('incomplete-' + incomplete.id, nIdx)" x-collapse class="p-3 bg-white dark:bg-gray-900 space-y-3">
                            <div>
                              <p class="text-xs font-semibold text-gray-500 mb-1">CSS Selector:</p>
                              <code class="block text-xs bg-gray-100 dark:bg-gray-800 p-2 rounded border border-gray-200 dark:border-gray-700 font-mono text-purple-700 overflow-x-auto" x-text="formatSelector(node.target)"></code>
                            </div>
                            
                            <!-- HTML Source -->
                            <div>
                              <p class="text-xs font-semibold text-gray-500 mb-1">HTML Source:</p>
                              <pre class="text-xs bg-gray-100 dark:bg-gray-800 p-3 rounded border border-gray-200 dark:border-gray-700 overflow-x-auto"><code class="font-mono" x-html="colorCodeHtml(node.html)"></code></pre>
                            </div>
                            <div class="bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded p-3">
                              <p class="text-xs font-semibold text-yellow-900 mb-2">Manual Review Required:</p>
                              <p class="text-xs text-yellow-800">Automated tools cannot determine if this element passes or fails. Manual inspection is required to verify accessibility compliance.</p>
                            </div>
                            <template x-if="node.any?.length > 0 || node.all?.length > 0">
                              <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded p-3">
                                <p class="text-xs font-semibold text-blue-900 mb-2">Review Criteria:</p>
                                <div class="space-y-2 text-xs">
                                  <template x-for="check in node.any" :key="check.id">
                                    <div class="flex items-start gap-2">
                                      <span class="text-blue-600 mt-0.5">→</span>
                                      <span class="text-blue-800" x-text="check.message"></span>
                                    </div>
                                  </template>
                                  <template x-for="check in node.all" :key="check.id">
                                    <div class="flex items-start gap-2">
                                      <span class="text-blue-600 mt-0.5">→</span>
                                      <span class="text-blue-800" x-text="check.message"></span>
                                    </div>
                                  </template>
                                </div>
                              </div>
                            </template>
                          </div>
                        </div>
                      </template>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
        
        <!-- Inapplicable Tab -->
        <div x-show="axeModal.activeTab === 'inapplicable'" class="space-y-4">
          <template x-if="axeModal.stats.inapplicable === 0">
            <div class="bg-gray-50 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg p-6 text-center">
              <p class="text-gray-600">No inapplicable rules.</p>
            </div>
          </template>
          <template x-if="axeModal.stats.inapplicable > 0" x-for="(inapplicable, iaIdx) in axeModal.data.inapplicable" :key="inapplicable.id">
            <div class="border border-gray-300 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 rounded-lg p-4 shadow-sm">
              <h4 class="font-semibold text-gray-900 mb-1" x-text="inapplicable.id"></h4>
              <p class="text-gray-700 text-sm" x-text="inapplicable.description"></p>
            </div>
          </template>
        </div>
      </div>
        
        <!-- Loading State -->
        <div x-show="!axeModal.error && (axeModal.data.violations.length === 0 && axeModal.data.passes.length === 0 && axeModal.data.incomplete.length === 0 && axeModal.data.inapplicable.length === 0)" class="p-6 text-center">
          <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-purple-600"></div>
          <p class="text-gray-600 mt-4">Loading accessibility report...</p>
        </div>
      </div>
    </div>
  </div>
  
</body>
</html>
